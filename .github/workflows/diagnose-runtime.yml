name: Diagnose Tencent Runtime

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/diagnose-runtime.yml

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Inspect runtime over SSH
        run: |
          ssh -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" '
            set -eu

            echo "== host =="
            whoami
            hostname
            date -Is

            echo "== app dir =="
            pwd
            ls -la /home/ubuntu/Tahoe-Agent | sed -n "1,120p"

            echo "== git state =="
            git -C /home/ubuntu/Tahoe-Agent rev-parse HEAD || true
            git -C /home/ubuntu/Tahoe-Agent status --short || true

            echo "== app-shell source markers =="
            grep -nE "w-\\[248px\\]|h-\\[64px\\]|p-4 lg:p-6 xl:p-7" /home/ubuntu/Tahoe-Agent/components/layout/app-shell.tsx || true

            echo "== .next markers =="
            find /home/ubuntu/Tahoe-Agent/.next -maxdepth 3 -type f | sed -n "1,120p"
            grep -R -nE "w-\\[248px\\]|h-\\[64px\\]|p-4 lg:p-6 xl:p-7|space-y-6 xl:space-y-5" /home/ubuntu/Tahoe-Agent/.next 2>/dev/null | sed -n "1,80p" || true

            echo "== pm2 =="
            pm2 list || true
            pm2 describe tahoe || true
            pm2 logs tahoe --lines 120 --nostream || true

            echo "== listening ports =="
            sudo ss -ltnp | grep -E ":80|:443|:3000|:3001|:3002|:3003" || true

            echo "== nginx routes =="
            sudo grep -R -nE "server_name|listen|proxy_pass|root" /etc/nginx/sites-enabled /etc/nginx/conf.d 2>/dev/null || true

            echo "== local curl via nginx =="
            curl --max-time 10 -s http://127.0.0.1/render-lab | grep -o "/_next/static/css/[^\"]*" | head -n 1 || true

            echo "== local curl via app ports =="
            for port in 3000 3001 3002 3003; do
              echo "-- port ${port} --"
              curl --max-time 8 -s "http://127.0.0.1:${port}/render-lab" | grep -o "/_next/static/css/[^\"]*" | head -n 1 || true
            done
          '
