name: Diagnose Tencent Runtime

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/diagnose-runtime.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Inspect runtime over SSH
        run: |
          ssh -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" 'bash -s' <<'EOF_REMOTE' | tee diagnose-report.txt
            set -eu

            echo "== host =="
            whoami
            hostname
            date -Is

            echo "== app dir =="
            pwd
            ls -ld /home/ubuntu/Tahoe-Agent
            stat -c "%n %y %U:%G" /home/ubuntu/Tahoe-Agent/components/layout/app-shell.tsx /home/ubuntu/Tahoe-Agent/app/render-lab/page.tsx /home/ubuntu/Tahoe-Agent/.next 2>/dev/null || true

            echo "== git state =="
            git -C /home/ubuntu/Tahoe-Agent rev-parse HEAD || true
            git -C /home/ubuntu/Tahoe-Agent status --short | sed -n "1,40p" || true

            echo "== app-shell source markers =="
            grep -nE "w-\\[248px\\]|h-\\[64px\\]|p-4 lg:p-6 xl:p-7" /home/ubuntu/Tahoe-Agent/components/layout/app-shell.tsx || true

            echo "== build markers =="
            cat /home/ubuntu/Tahoe-Agent/.next/BUILD_ID 2>/dev/null || true
            ls -1 /home/ubuntu/Tahoe-Agent/.next/static/css 2>/dev/null || true
            grep -o "space-y-6 xl:space-y-5" /home/ubuntu/Tahoe-Agent/.next/server/app/render-lab/page.js 2>/dev/null | head -n 1 || true
            grep -R -o "w-\\[248px\\]" /home/ubuntu/Tahoe-Agent/.next/static/chunks 2>/dev/null | head -n 1 || true
            grep -R -o "h-\\[64px\\]" /home/ubuntu/Tahoe-Agent/.next/static/chunks 2>/dev/null | head -n 1 || true

            echo "== pm2 =="
            pm2 list || true

            echo "== pm2 targets =="
            for app in tahoe-agent tahoe; do
              echo "-- ${app} --"
              pm2 describe "${app}" | sed -n "1,80p" || true
              pid="$(pm2 pid "${app}" | tail -n 1 | tr -dc "0-9")"
              echo "pid=${pid:-none}"
              if [ -n "${pid}" ] && [ "${pid}" -gt 0 ] 2>/dev/null; then
                readlink -f "/proc/${pid}/cwd" || true
                ps -fp "${pid}" || true
              fi
            done

            echo "== pm2 logs =="
            echo "== database env summary =="
            node <<'"'"'EOF'"'"'
            const fs = require("fs");

            function readEnvFile(path) {
              try {
                const raw = fs.readFileSync(path, "utf8");
                const map = {};
                for (const line of raw.split(/\r?\n/)) {
                  const trimmed = line.trim();
                  if (!trimmed || trimmed.startsWith("#")) continue;
                  const idx = trimmed.indexOf("=");
                  if (idx === -1) continue;
                  const key = trimmed.slice(0, idx).trim();
                  const value = trimmed.slice(idx + 1).trim().replace(/^['"]|['"]$/g, "");
                  map[key] = value;
                }
                return map;
              } catch {
                return {};
              }
            }

            function summarize(label, value) {
              if (!value) {
                console.log(`${label}: missing`);
                return;
              }

              try {
                const url = new URL(value);
                console.log(`${label}: protocol=${url.protocol.replace(":", "")} host=${url.hostname} port=${url.port || "(default)"} db=${url.pathname.replace(/^\//, "") || "(none)"} user=${decodeURIComponent(url.username || "") || "(none)"}`);
              } catch {
                console.log(`${label}: present but unparsable`);
              }
            }

            const envFile = readEnvFile("/home/ubuntu/Tahoe-Agent/.env");
            const envLocalFile = readEnvFile("/home/ubuntu/Tahoe-Agent/.env.local");
            summarize(".env DATABASE_URL", envFile.DATABASE_URL);
            summarize(".env.local DATABASE_URL", envLocalFile.DATABASE_URL);
            summarize(".env DIRECT_URL", envFile.DIRECT_URL);
            summarize(".env.local DIRECT_URL", envLocalFile.DIRECT_URL);
            EOF

            echo "== pm2 database env summary =="
            pm2 jlist 2>/dev/null | node <<'"'"'EOF'"'"'
            const fs = require("fs");

            function summarize(label, value) {
              if (!value) {
                console.log(`${label}: missing`);
                return;
              }

              try {
                const url = new URL(value);
                console.log(`${label}: protocol=${url.protocol.replace(":", "")} host=${url.hostname} port=${url.port || "(default)"} db=${url.pathname.replace(/^\//, "") || "(none)"} user=${decodeURIComponent(url.username || "") || "(none)"}`);
              } catch {
                console.log(`${label}: present but unparsable`);
              }
            }

            const payload = fs.readFileSync(0, "utf8").trim();
            if (!payload) {
              console.log("pm2 apps: unavailable");
              process.exit(0);
            }

            const apps = JSON.parse(payload);
            for (const appName of ["tahoe-agent", "tahoe"]) {
              const app = apps.find((entry) => entry.name === appName);
              console.log(`-- ${appName} --`);
              summarize("DATABASE_URL", app?.pm2_env?.DATABASE_URL);
              summarize("DIRECT_URL", app?.pm2_env?.DIRECT_URL);
            }
            EOF

            echo "== pm2 logs =="
            pm2 logs tahoe-agent --lines 20 --nostream | tail -n 30 || true
            pm2 logs tahoe --lines 10 --nostream | tail -n 20 || true

            echo "== prisma runtime probe =="
            cd /home/ubuntu/Tahoe-Agent
            set +e
            node <<'"'"'EOF'"'"'
            const { PrismaClient } = require("@prisma/client");

            async function main() {
              const prisma = new PrismaClient();
              try {
                await prisma.$queryRaw`SELECT 1`;
                console.log("prisma probe: ok");
              } catch (error) {
                console.log("prisma probe:", error?.name || "UnknownError");
                console.log("prisma message:", error?.message || String(error));
                if (error?.errorCode) {
                  console.log("prisma code:", error.errorCode);
                }
              } finally {
                await prisma.$disconnect().catch(() => {});
              }
            }

            main().catch((error) => {
              console.log("probe bootstrap failed:", error?.message || String(error));
              process.exitCode = 1;
            });
            EOF
            set -e

            echo "== listening ports =="
            sudo ss -ltnp | grep -E ":80|:443|:3000|:3001|:3002|:3003" || true

            echo "== nginx routes =="
            sudo grep -R -nE "server_name|listen|proxy_pass|root" /etc/nginx/sites-enabled /etc/nginx/conf.d 2>/dev/null || true

            echo "== local responses =="
            for target in http://127.0.0.1/render-lab http://127.0.0.1:3000/render-lab http://127.0.0.1:3001/render-lab; do
              echo "-- ${target} --"
              html="$(curl --max-time 8 -s "${target}" || true)"
              printf "%s\n" "${html}" | grep -o "/_next/static/css/[^\"]*" | head -n 1 || true
              printf "%s\n" "${html}" | grep -oE "w-\\[(248|280)px\\]|h-\\[64px\\]|h-14|space-y-6 xl:space-y-5|space-y-8" | head -n 6 | tr "\n" " " || true
              echo
            done
          EOF_REMOTE

      - name: Publish diagnosis comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const report = fs.readFileSync("diagnose-report.txt", "utf8");
            const body = [
              "Tencent runtime diagnosis report:",
              "",
              "```text",
              report.slice(0, 40000),
              "```",
            ].join("\n");

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body,
            });
