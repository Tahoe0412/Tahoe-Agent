name: Deploy To Tencent Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload project files
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env' \
            -czf - . | ssh -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "
              set -e
              APP_DIR=/home/ubuntu/Tahoe-Agent
              STAGE_DIR=\$(mktemp -d /tmp/tahoe-release.XXXXXX)
              trap 'sudo rm -rf \"\$STAGE_DIR\"' EXIT
              sudo mkdir -p \"\$APP_DIR\"
              sudo tar --no-same-owner --no-same-permissions -xzf - -C \"\$STAGE_DIR\"
              sudo find \"\$APP_DIR\" -mindepth 1 -maxdepth 1 ! -name '.env' ! -name '.env.local' ! -name '.git' -exec rm -rf {} +
              sudo cp -a \"\$STAGE_DIR\"/. \"\$APP_DIR\"/
              sudo chown -R \"${{ secrets.SERVER_USER }}\":\"${{ secrets.SERVER_USER }}\" \"\$APP_DIR\"
            "

      - name: Deploy over SSH
        run: |
          ssh -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" '
            cd /home/ubuntu/Tahoe-Agent
            SKIP_GIT_PULL=1 bash /home/ubuntu/Tahoe-Agent/scripts/deploy.sh
          '
