name: Deploy To Tencent Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect Prisma schema changes
        id: prisma_changes
        run: |
          before_sha="${{ github.event.before }}"

          if [ -z "$before_sha" ] || [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
            echo "skip_prisma_db_push=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$before_sha" "${{ github.sha }}" -- prisma/schema.prisma prisma/migrations; then
            echo "skip_prisma_db_push=1" >> "$GITHUB_OUTPUT"
          else
            echo "skip_prisma_db_push=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload project files
        run: |
          set -euo pipefail
          SSH_OPTS="-o ConnectTimeout=15 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"

          trap 'rm -f release.tgz' EXIT

          git archive --format=tar.gz --output=release.tgz HEAD
          du -h release.tgz | tee upload-size.txt

          timeout 5m scp ${SSH_OPTS} -P "${{ secrets.SERVER_PORT }}" release.tgz "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/tahoe-release.tgz"

          timeout 5m ssh ${SSH_OPTS} -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "
            set -e
            APP_DIR=/home/ubuntu/Tahoe-Agent
            STAGE_DIR=\$(mktemp -d /tmp/tahoe-release.XXXXXX)
            ARCHIVE=/tmp/tahoe-release.tgz
            trap 'sudo rm -rf \"\$STAGE_DIR\" \"\$ARCHIVE\"' EXIT
            sudo mkdir -p \"\$APP_DIR\"
            sudo tar --no-same-owner --no-same-permissions -xzf \"\$ARCHIVE\" -C \"\$STAGE_DIR\"
            sudo find \"\$APP_DIR\" -mindepth 1 -maxdepth 1 ! -name '.env' ! -name '.env.local' ! -name '.git' -exec rm -rf {} +
            sudo cp -a \"\$STAGE_DIR\"/. \"\$APP_DIR\"/
            sudo chown -R \"${{ secrets.SERVER_USER }}\":\"${{ secrets.SERVER_USER }}\" \"\$APP_DIR\"
          " 2>&1 | tee upload-report.txt

      - name: Deploy over SSH
        run: |
          set -euo pipefail
          SSH_OPTS="-o ConnectTimeout=15 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          timeout 10m ssh ${SSH_OPTS} -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" '
            cd /home/ubuntu/Tahoe-Agent
            SKIP_GIT_PULL=1 SKIP_PRISMA_DB_PUSH=${{ steps.prisma_changes.outputs.skip_prisma_db_push }} bash /home/ubuntu/Tahoe-Agent/scripts/deploy.sh
          ' 2>&1 | tee deploy-report.txt

      - name: Verify today hot-topics release
        run: |
          set -euo pipefail
          SSH_OPTS="-o ConnectTimeout=15 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          timeout 2m ssh ${SSH_OPTS} -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" '
            set -euo pipefail
            response="$(curl --max-time 20 -s -X POST http://127.0.0.1:3000/api/research/hot-topics -H "Content-Type: application/json" --data "{\"query\":\"火星公民 OR 茶饮 OR 慢生活\"}")"
            printf "%s\n" "$response" > /tmp/tahoe-hot-topics-smoke.json
            echo "$response" | grep -q "\"success\":true"
            if echo "$response" | grep -q "Result First Hook\|Ugc Workflow\|view_count\":-[0-9]"; then
              echo "[verify] old mock trend output is still active"
              cat /tmp/tahoe-hot-topics-smoke.json
              exit 1
            fi
          ' 2>&1 | tee verify-report.txt

      - name: Capture failure diagnostics over SSH
        if: failure()
        continue-on-error: true
        run: |
          set -euo pipefail
          SSH_OPTS="-o ConnectTimeout=15 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          timeout 2m ssh ${SSH_OPTS} -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" '
            set +e
            echo "== host =="
            whoami
            hostname
            date -Is

            echo "== disk =="
            df -h /
            df -h /tmp

            echo "== app dir =="
            ls -ld /home/ubuntu/Tahoe-Agent
            find /home/ubuntu/Tahoe-Agent -maxdepth 1 -mindepth 1 | sort | sed -n "1,40p"

            echo "== temp release =="
            ls -lh /tmp/tahoe-release.tgz 2>/dev/null || true
            ls -ld /tmp/tahoe-release.* 2>/dev/null || true

            echo "== pm2 =="
            pm2 list || true

            echo "== recent app files =="
            stat -c "%n %y %U:%G" /home/ubuntu/Tahoe-Agent/scripts/deploy.sh /home/ubuntu/Tahoe-Agent/app/api/research/hot-topics/route.ts 2>/dev/null || true
          ' 2>&1 | tee diagnostics-report.txt

      - name: Publish deploy failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const sections = [];
            for (const [label, file] of [
              ["archive-size", "upload-size.txt"],
              ["upload", "upload-report.txt"],
              ["deploy", "deploy-report.txt"],
              ["verify", "verify-report.txt"],
              ["diagnostics", "diagnostics-report.txt"],
            ]) {
              if (fs.existsSync(file)) {
                sections.push(`== ${label} ==\n${fs.readFileSync(file, "utf8")}`);
              }
            }

            const report = sections.length > 0
              ? sections.join("\n\n")
              : "No workflow report files were generated.";
            const body = [
              "Deploy workflow failure report:",
              "",
              "```text",
              report.slice(-30000),
              "```",
            ].join("\n");

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body,
            });
