name: Deploy To Tencent Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Prisma schema changes
        id: prisma_changes
        run: |
          set -euo pipefail
          before_sha="${{ github.event.before }}"

          if [ -z "$before_sha" ] || [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
            echo "skip_prisma_db_push=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git cat-file -e "${before_sha}^{commit}" 2>/dev/null; then
            git fetch --no-tags --prune origin "${before_sha}"
          fi

          if git diff --quiet "$before_sha" "${{ github.sha }}" -- prisma/schema.prisma prisma/migrations; then
            echo "skip_prisma_db_push=1" >> "$GITHUB_OUTPUT"
          else
            echo "skip_prisma_db_push=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Validate deploy secrets
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "[workflow] DATABASE_URL secret is missing. Configure it in GitHub repository secrets before deploying."
            exit 1
          fi
          if [ -z "${{ secrets.DIRECT_URL }}" ]; then
            echo "[workflow] DIRECT_URL secret is missing. DATABASE_URL is still required for runtime, but adding DIRECT_URL is recommended for Prisma operations."
          fi

      - name: Upload project files
        run: |
          set -euo pipefail
          SSH_OPTS="-o ConnectTimeout=15 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"

          trap 'rm -f release.tgz' EXIT

          git archive --format=tar.gz --output=release.tgz HEAD
          du -h release.tgz | tee upload-size.txt

          timeout 5m scp ${SSH_OPTS} -P "${{ secrets.SERVER_PORT }}" release.tgz "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/tahoe-release.tgz"

          timeout 5m ssh ${SSH_OPTS} -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "
            set -e
            APP_DIR=/home/ubuntu/Tahoe-Agent
            STAGE_DIR=\$(mktemp -d /tmp/tahoe-release.XXXXXX)
            ARCHIVE=/tmp/tahoe-release.tgz
            trap 'sudo rm -rf \"\$STAGE_DIR\" \"\$ARCHIVE\"' EXIT
            sudo mkdir -p \"\$APP_DIR\"
            sudo tar --no-same-owner --no-same-permissions -xzf \"\$ARCHIVE\" -C \"\$STAGE_DIR\"
            sudo find \"\$APP_DIR\" -mindepth 1 -maxdepth 1 ! -name '.env' ! -name '.env.local' ! -name '.git' -exec rm -rf {} +
            sudo cp -a \"\$STAGE_DIR\"/. \"\$APP_DIR\"/
            sudo chown -R \"${{ secrets.SERVER_USER }}\":\"${{ secrets.SERVER_USER }}\" \"\$APP_DIR\"
          " 2>&1 | tee upload-report.txt

      - name: Setup Clash proxy on server
        continue-on-error: true
        run: |
          set -euo pipefail
          SSH_OPTS="-o ConnectTimeout=15 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          timeout 5m ssh ${SSH_OPTS} -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" '
            set -euo pipefail
            CLASH_DIR=/opt/clash
            CLASH_BIN=$CLASH_DIR/clash
            CONFIG_FILE=$CLASH_DIR/config.yaml
            SUB_URL="${{ secrets.CLASH_SUB_URL }}"
            APP_DIR=/home/ubuntu/Tahoe-Agent

            if [ -z "$SUB_URL" ]; then
              echo "[proxy] CLASH_SUB_URL secret not set, skipping proxy setup"
              exit 0
            fi

            # Install Clash binary if missing
            if [ ! -f "$CLASH_BIN" ]; then
              echo "[proxy] Installing Clash..."
              sudo mkdir -p "$CLASH_DIR"
              CLASH_URL="https://github.com/Dreamacro/clash/releases/download/v1.18.0/clash-linux-amd64-v1.18.0.gz"
              curl -fsSL "$CLASH_URL" -o /tmp/clash.gz
              gunzip -f /tmp/clash.gz
              sudo mv /tmp/clash "$CLASH_BIN"
              sudo chmod +x "$CLASH_BIN"
              echo "[proxy] Clash binary installed"
            fi

            # Always refresh subscription config
            sudo curl -fsSL "$SUB_URL" -o "$CONFIG_FILE"
            if ! grep -q "^mixed-port:" "$CONFIG_FILE"; then
              sudo sed -i "1i mixed-port: 7890" "$CONFIG_FILE"
            fi
            echo "[proxy] Config refreshed"

            # Create systemd service if missing
            if [ ! -f /etc/systemd/system/clash.service ]; then
              sudo tee /etc/systemd/system/clash.service > /dev/null <<SVCEOF
          [Unit]
          Description=Clash Proxy
          After=network.target
          [Service]
          Type=simple
          ExecStart=$CLASH_BIN -d $CLASH_DIR
          Restart=on-failure
          RestartSec=5
          [Install]
          WantedBy=multi-user.target
          SVCEOF
              sudo systemctl daemon-reload
              sudo systemctl enable clash
            fi

            sudo systemctl restart clash
            sleep 2

            # Ensure HTTPS_PROXY in .env.local
            touch "$APP_DIR/.env.local"
            if ! grep -q "HTTPS_PROXY" "$APP_DIR/.env.local"; then
              echo "HTTPS_PROXY=http://127.0.0.1:7890" >> "$APP_DIR/.env.local"
              echo "[proxy] Added HTTPS_PROXY to .env.local"
            fi

            # Quick connectivity test
            if curl --max-time 10 -s --proxy http://127.0.0.1:7890 https://www.google.com > /dev/null 2>&1; then
              echo "[proxy] ✓ Proxy works — Google reachable"
            else
              echo "[proxy] ⚠ Proxy started but Google test failed"
            fi
          ' 2>&1 | tee proxy-setup-report.txt

      - name: Deploy over SSH
        run: |
          set -euo pipefail
          SSH_OPTS="-o ConnectTimeout=15 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          if [ -n "${{ secrets.DATABASE_URL }}" ]; then
            echo "[workflow] DATABASE_URL secret: present" | tee deploy-report.txt
          else
            echo "[workflow] DATABASE_URL secret: missing" | tee deploy-report.txt
          fi
          if [ -n "${{ secrets.DIRECT_URL }}" ]; then
            echo "[workflow] DIRECT_URL secret: present" | tee -a deploy-report.txt
          else
            echo "[workflow] DIRECT_URL secret: missing" | tee -a deploy-report.txt
          fi
          timeout 10m ssh ${SSH_OPTS} -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" '
            cd /home/ubuntu/Tahoe-Agent
            CI_DATABASE_URL_OVERRIDE='"'"'${{ secrets.DATABASE_URL }}'"'"' \
            CI_DIRECT_URL_OVERRIDE='"'"'${{ secrets.DIRECT_URL }}'"'"' \
            SKIP_GIT_PULL=1 \
            SKIP_PRISMA_DB_PUSH=${{ steps.prisma_changes.outputs.skip_prisma_db_push }} \
            bash /home/ubuntu/Tahoe-Agent/scripts/deploy.sh
          ' 2>&1 | tee -a deploy-report.txt

      - name: Verify today hot-topics release
        run: |
          set -euo pipefail
          SSH_OPTS="-o ConnectTimeout=15 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          timeout 2m ssh ${SSH_OPTS} -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" '
            set -euo pipefail
            health="$(curl --max-time 20 -s http://127.0.0.1:3000/api/health)"
            printf "%s\n" "$health" > /tmp/tahoe-health-smoke.json
            echo "$health" | grep -q "\"status\":\"ok\""
            echo "$health" | grep -q "\"database\":\"ok\""
            response="$(curl --max-time 20 -s -X POST http://127.0.0.1:3000/api/research/hot-topics -H "Content-Type: application/json" --data "{\"query\":\"火星公民 OR 茶饮 OR 慢生活\"}")"
            printf "%s\n" "$response" > /tmp/tahoe-hot-topics-smoke.json
            echo "$response" | grep -q "\"success\":true"
            if echo "$response" | grep -q "Result First Hook\|Ugc Workflow\|view_count\":-[0-9]"; then
              echo "[verify] old mock trend output is still active"
              cat /tmp/tahoe-hot-topics-smoke.json
              exit 1
            fi
          ' 2>&1 | tee verify-report.txt

      - name: Capture failure diagnostics over SSH
        if: failure()
        continue-on-error: true
        run: |
          set -euo pipefail
          SSH_OPTS="-o ConnectTimeout=15 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          timeout 2m ssh ${SSH_OPTS} -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" '
            set +e
            echo "== host =="
            whoami
            hostname
            date -Is

            echo "== disk =="
            df -h /
            df -h /tmp

            echo "== app dir =="
            ls -ld /home/ubuntu/Tahoe-Agent
            find /home/ubuntu/Tahoe-Agent -maxdepth 1 -mindepth 1 | sort | sed -n "1,40p"

            echo "== temp release =="
            ls -lh /tmp/tahoe-release.tgz 2>/dev/null || true
            ls -ld /tmp/tahoe-release.* 2>/dev/null || true

            echo "== pm2 =="
            pm2 list || true

            echo "== pm2 database env summary =="
            pm2 jlist 2>/dev/null | node -e '
              const fs = require("fs");
              const payload = fs.readFileSync(0, "utf8").trim();
              if (!payload) process.exit(0);
              const apps = JSON.parse(payload);
              for (const app of apps) {
                const env = app?.pm2_env ?? {};
                const databaseUrl = env.DATABASE_URL || "";
                const directUrl = env.DIRECT_URL || "";
                const summarize = (value) => {
                  if (typeof value !== "string" || value.length === 0) return "missing";
                  try {
                    const url = new URL(value);
                    return `protocol=${url.protocol.replace(":", "")} host=${url.hostname || "missing"} port=${url.port || "default"} db=${url.pathname.replace(/^\//, "") || "missing"} user=${url.username || "missing"}`;
                  } catch {
                    return "present (unparseable)";
                  }
                };
                console.log(`app=${app.name}`);
                console.log(`  DATABASE_URL: ${summarize(databaseUrl)}`);
                console.log(`  DIRECT_URL: ${summarize(directUrl)}`);
              }
            ' || true

            echo "== recent app files =="
            stat -c "%n %y %U:%G" /home/ubuntu/Tahoe-Agent/scripts/deploy.sh /home/ubuntu/Tahoe-Agent/app/api/research/hot-topics/route.ts 2>/dev/null || true

            echo "== postgres role summary =="
            sudo -u postgres psql -tAc "select rolname from pg_roles where rolname in ('postgres','tahoe') order by rolname;" 2>/dev/null || true

            echo "== postgres db summary =="
            sudo -u postgres psql -tAc \"select datname from pg_database where datname in ('ai_video_mvp') order by datname;\" 2>/dev/null || true

            echo "== postgres local probe =="
            sudo -u postgres psql -d ai_video_mvp -tAc "select current_user, current_database();" 2>/dev/null || true
          ' 2>&1 | tee diagnostics-report.txt

      - name: Publish deploy failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const sections = [];
            for (const [label, file] of [
              ["archive-size", "upload-size.txt"],
              ["upload", "upload-report.txt"],
              ["deploy", "deploy-report.txt"],
              ["verify", "verify-report.txt"],
              ["diagnostics", "diagnostics-report.txt"],
            ]) {
              if (fs.existsSync(file)) {
                sections.push(`== ${label} ==\n${fs.readFileSync(file, "utf8")}`);
              }
            }

            const report = sections.length > 0
              ? sections.join("\n\n")
              : "No workflow report files were generated.";
            const body = [
              "Deploy workflow failure report:",
              "",
              "```text",
              report.slice(-30000),
              "```",
            ].join("\n");

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body,
            });
